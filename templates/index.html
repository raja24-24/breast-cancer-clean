<!DOCTYPE html>
<html>
<head>
    <title>Breast Cancer Detection</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        
            height: 100vh;
           
            
        
            background: linear-gradient(rgba(255,192,203,0.6), rgba(255,255,255,0.7)),
            url("https://images.unsplash.com/photo-1588776814546-1ffcf47267a5");
        
            background-size: cover;
            background-position: center;
        }
        #dashboard {
    
    width: 100%;
    height: 100vh;
}
#dashboard.active {
    display: flex;
}
.login-card {
    width: 320px;
    margin: 100px auto;
    text-align: center;
}
        

        .card {
            
            padding: 25px;
            border-radius: 15px;
        
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        /* Title */
        .card h2 {
            margin-bottom: 15px;
            color: #333;
        }
        
   
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }
        .title {
            color: #d63384;
            margin-bottom: 5px;
        }
        
        .subtitle {
            font-size: 14px;
            color: #555;
            margin-bottom: 15px;
        }
        
      
        button {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
        
            border: none;
            border-radius: 8px;
        
            background: linear-gradient(45deg, #ff758c, #ff7eb3);
            color: white;
        
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        button:hover {
            transform: scale(1.05);
            background: linear-gradient(45deg, #ff5f6d, #ffc371);
        }
        
      
        .hidden {
            display: none;
        }
        
       
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}


.card {
    animation: fadeIn 0.6s ease-in-out;
}


input:focus {
    border: 1px solid #ff758c;
    box-shadow: 0 0 8px rgba(255, 117, 140, 0.5);
}

button:active {
    transform: scale(0.95);
}


input, button {
    transition: all 0.3s ease;
}

input {
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
}

.sidebar {
    width: 220px;
    height: 100vh;
    background: linear-gradient(180deg, #1a1a2e, #16213e);
    color: white;
    padding: 20px;
    
}
#loginPage {
    z-index: 2;
}

#signupPage {
    z-index: 3;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 30px;
}


.sidebar button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    background: #0f3460;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.sidebar button:hover {
    background: #e94560;
}


.report-card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.2s;
}

.report-card:hover {
    background: #f9f9f9;
}

/* Header */
.report-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}
/* Full screen pages */
#loginPage, #signupPage {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    display: flex;
    justify-content: center;
    align-items: center;
}
/* 💬 Chat Button */
#chatToggle{
    position: fixed;
    left: 20px;
    bottom: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #e94560;
    color: white;
    font-size: 28px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    z-index:999;
}

/* Chat Window */
#chatbotBox{
    position: fixed;
    left: 20px;
    bottom: 90px;
    width: 320px;
    height: 420px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    overflow: hidden;
    z-index:999;
    display:flex;
    flex-direction:column;
}

.chat-header{
    background:#16213e;
    color:white;
    padding:12px;
    font-weight:bold;
}

.chat-body{
    flex:1;
    padding:10px;
    overflow-y:auto;
    background:#f8f9fa;
}

.chat-footer{
    display: flex;
    gap: 10px;
    padding: 12px;
    background: white;
    border-top: 1px solid #ddd;
}

.chat-footer input{
    flex: 1;
    width: auto !important;
    min-width: 0;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.chat-footer button{
    width: 110px;
    margin: 0;
    padding: 12px;
    border-radius: 10px;
}

.bot-msg, .user-msg{
    padding:8px 10px;
    border-radius:10px;
    margin-bottom:8px;
    max-width:85%;
}

.bot-msg{
    background:#ececec;
}

.user-msg{
    background:#d4edda;
    margin-left:auto;
}

.hidden{
    display:none !important;
}
/* Colors */
.green {
    color: green;
    font-weight: bold;
}

.red {
    color: red;
    font-weight: bold;
}


.main {
    flex: 1;
    padding: 30px;
    overflow-y: auto;
}
#dashboard .card {
    width: 100%;
    text-align: left;
}
#reports {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}
/* Cards */
.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    margin-bottom: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}
    </style>
</head>

<body>


<!-- LOGIN PAGE -->
<div id="loginPage">
    <div class="card login-card">
    <h2 class="title">
        🎗️ Breast Cancer 
    </h2>
    <p class="subtitle">Early Detection System</p>
    <input id="loginUser" placeholder="👤 Username">
    <input id="loginPass" type="password" placeholder="🔒 Password">
    <button onclick="login()">🔐 Login Securely</button>
    <p style="cursor:pointer;color:#007bff;" onclick="forgotPassword()">
        Forgot Password?
    </p>
    <p>New user?</p>
    <button onclick="showSignup()">Signup</button>
</div>
</div>

<!-- SIGNUP PAGE -->
<div id="signupPage" style="display:none;">
    <div class="card login-card">
    <h2 class="title">
        🎗️ Create Account
    </h2>
    <p class="subtitle">Join Detection System</p>
    <input id="signupUser" placeholder="👤 Username">
    <input id="signupPass" type="password" placeholder="🔒 Password">
    <p id="passwordStrength" style="font-size:12px;"></p>
    <p id="passwordRules" style="font-size:12px;color:#555;"></p>
    <button onclick="signup()">✨ Create Account</button>
    <button onclick="showLogin()">Back</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🩺 System</h2>

        <button onclick="showSection('detect')">🔍 Detect</button>
        <button onclick="showSection('reports')">📁 Reports</button>
        <button onclick="logout()">🚪 Logout</button>
    </div>

   
    <div class="main">

        <!-- DETECT SECTION -->
        <div id="detectSection" class="card">
            <h3>🔍 Detection</h3>

            <label>Select Model:</label>
            <select id="modelSelect">
                <option value="densenet">DenseNet</option>
                <option value="resnet">ResNet</option>
                <option value="efficientnet">EfficientNet</option>
                <option value="inception">Inception</option>
            </select>

            <br><br>

            <input type="file" id="image">

            <button onclick="predict()">🚀 Predict</button>

            <h3 id="result"></h3>

            <div id="explanation"></div>

            
            <img id="gradcamImage">

            <br>

            <button id="compareBtn" onclick="showComparison()" style="display:none;">
                📊 Compare Models
            </button>

            <div id="modelBreakdown"></div>
        </div>

        <!-- REPORTS SECTION -->
        <div id="reportSection" class="card hidden">
            <h3>📁 Reports History</h3>

            <button onclick="loadReports()">Load Reports</button>

            <div id="reports"></div>
        </div>

    </div>
</div>
<!-- 💬 Chatbot Button -->
<div id="chatToggle" onclick="toggleChatbot()">💬</div>

<!-- 💬 Chat Window -->
<div id="chatbotBox" class="hidden">
    <div class="chat-header">
        🤖 AI Health Assistant
        <span onclick="toggleChatbot()" style="float:right;cursor:pointer;">✖</span>
    </div>

    <div id="chatMessages" class="chat-body">
        <div class="bot-msg">Hello 👋 Ask me anything about breast cancer detection.</div>
    </div>

    <div class="chat-footer">
        <input type="text" id="chatInput" placeholder="Type your question...">
        <button onclick="sendChat()">Send</button>
    </div>
</div>
<script>
    let modelData = {};
    let currentUser = "";
    
    // -------- NAVIGATION --------
    function showSignup() {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("signupPage").style.display = "flex";
    }
    
    function showLogin() {
        document.getElementById("signupPage").style.display = "none";
        document.getElementById("loginPage").style.display = "flex";
    }
    
    function showSection(section) {
        detectSection.classList.add("hidden");
        reportSection.classList.add("hidden");
    
        if(section === "detect") detectSection.classList.remove("hidden");
        if(section === "reports") reportSection.classList.remove("hidden");
    }
    
    function logout() {
       
            localStorage.clear();
        
            document.getElementById("dashboard").style.display = "none";
            document.getElementById("loginPage").style.display = "block";
        }
     
    
    
    // -------- AUTH --------
    function signup() {
        let email = signupUser.value;

// Email validation
let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!emailRegex.test(email)){
    alert("❌ Enter valid email (example@gmail.com)");
    return;
}
        let password = signupPass.value;

        // Strong password rules
        let regex = /^(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;
    
        if(!regex.test(password)){
            alert("❌ Password must have:\n- 8+ characters\n- Uppercase\n- Lowercase\n- Number\n- Special character");
            return;
        }
        fetch("/signup", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                username: signupUser.value,
                password: signupPass.value
            })
        }).then(res => res.json()).then(data => {
            alert(data.message);
            showLogin();
        });
    }
    signupPass.addEventListener("input", function() {

        let val = signupPass.value;
        let strength = document.getElementById("passwordStrength");
        let rules = document.getElementById("passwordRules");
    
        let messages = [];
    
        if(val.length < 8){
            messages.push("❌ Minimum 8 characters");
        }
        if(!/[A-Z]/.test(val)){
            messages.push("❌ Add uppercase letter");
        }
        if(!/[a-z]/.test(val)){
            messages.push("❌ Add lowercase letter");
        }
        if(!/\d/.test(val)){
            messages.push("❌ Add number");
        }
        if(!/[@$!%*?&]/.test(val)){
            messages.push("❌ Add special character (@$!%*?&)");
        }
    
        // Show rules
        rules.innerHTML = messages.join("<br>");
    
        // Strength logic
        if(messages.length === 0){
            strength.innerText = "✅ Strong Password";
            strength.style.color = "green";
        }
        else if(messages.length <= 2){
            strength.innerText = "⚠ Medium Password";
            strength.style.color = "orange";
        }
        else{
            strength.innerText = "❌ Weak Password";
            strength.style.color = "red";
        }
    });

    
function login()  {
        let email = loginUser.value;

let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!emailRegex.test(email)){
    alert("❌ Enter valid email");
    return;
}
        fetch("/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                username: loginUser.value,
                password: loginPass.value
            })
        })
        .then(res => res.json())
        .then(data => {
        
            console.log("LOGIN RESPONSE:", data);  
        
            if(data.status === "success"){
                currentUser = loginUser.value;
        
                localStorage.setItem("token", data.token);
        
               
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("signupPage").style.display = "none";

    document.getElementById("dashboard").style.display = "flex";
            } else {
                alert("Invalid login");
            }
        });
    }
    function forgotPassword(){

        let email = document.getElementById("loginUser").value;
    
        if(!email){
            alert("Enter your email first");
            return;
        }
    
        fetch("/forgot_password", {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                email: email
            })
        })
        .then(res=>res.json())
        .then(data=>{
            alert(data.message);
        });
    }
    
    // -------- PREDICT --------
    function predict() {
    
        let file = document.getElementById("image").files[0];
    
        if(!file){
            alert("Please upload an image");
            return;
        }
    
        if(file.size > 5 * 1024 * 1024){
            alert("Image too large");
            return;
        }
    
        let reader = new FileReader();
        let model = document.getElementById("modelSelect").value;
    
        result.innerText = "⏳ Analyzing image...";
        explanation.innerText = "";
    
        reader.onload = function(){
            let base64 = reader.result.split(",")[1];
    
            if (!base64) {
                alert("Image not loaded properly");
                return;
            }
    
            fetch("/predict", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": localStorage.getItem("token")
                },
                body: JSON.stringify({
                    image: base64,
                    model: model
                })
            })
            .then(res => res.json())
            .then(data => {

                console.log("RESPONSE:", data);   
            
              
                if(data.error){
                    alert(data.error);
                    return;
                }
            
                // ---------- RESULT ----------
                result.innerText = data.result;
            
                if(data.result.includes("Benign")){
                    result.className = "result-green";
                } else {
                    result.className = "result-red";
                }
            
                explanation.innerHTML = `
            ${data.explanation}
            
            <b>Confidence:</b> ${data.confidence.toFixed(2)}%
            <div style="background:#ddd;width:300px;height:20px;">
                <div style="background:green;width:${data.confidence}%;height:20px;"></div>
            </div>
                `;
            
               
                if(data.gradcam){
                    document.getElementById("gradcamImage").src =
                        "data:image/jpeg;base64," + data.gradcam;
                }
            
                modelData = data.models || {};
            
                document.getElementById("compareBtn").style.display = "block";
                document.getElementById("modelBreakdown").style.display = "none";
            })
            .catch(err => {
                console.error(err);
                alert("Error during prediction");
            });
        };
    
        reader.readAsDataURL(file);
    }
    
    // -------- SHOW COMPARISON --------
    function showComparison() {
    
        if (!modelData || Object.keys(modelData).length === 0) {
            alert("No comparison data available");
            return;
        }
    
        let html = "<h3>Model Comparison:</h3>";
    
        for (let model in modelData) {
            let m = modelData[model];
    
            let color = m.label === "Benign" ? "green" : "red";
    
            html += `
                <div style="margin:10px;padding:10px;border-radius:8px;background:#f0f0f0">
                    <b>${model.toUpperCase()}</b><br>
                    <span style="color:${color}">
                        ${m.label} (${m.confidence}%)
                    </span>
                </div>
            `;
        }
    
        document.getElementById("modelBreakdown").innerHTML = html;
        document.getElementById("modelBreakdown").style.display = "block";
    }
    
    // -------- REPORTS --------
    function loadReports(){
        fetch(`/reports`, {
            method: "GET",
            headers: {
                "Authorization": localStorage.getItem("token")   
            }
        })
        .then(r => r.json())
        .then(data => {
            let html = "";
    
            if(data.length === 0){
                html = "<p>No reports found</p>";
            }
    
            data.forEach(r => {
                html += `
                <div class="report-card">
                    <div class="report-header">
                        <span>📅 ${r[3]}</span>
                        <span class="${r[2].includes("Benign") ? "green" : "red"}">
                            ${r[2]}
                        </span>
                    </div>
                
                    <button onclick="viewReport(${r[0]})">🔍 View Report</button>
                </div>`;
            });
    
            document.getElementById("reports").innerHTML = html;
        });
    }
    
    function viewReport(id){
        fetch(`/reports`, {
            method: "GET",
            headers: {
                "Authorization": localStorage.getItem("token")   
            }
        })
        .then(r => r.json())
        .then(data => {
    
            let r = data.find(x => x[0] == id);
            document.getElementById("reports").innerHTML = `
            <div class="card">
            
                <h3>🔍 Report Details</h3>
            
                <img src="data:image/jpeg;base64,${r[4]}" 
                     style="width:300px;border-radius:10px;"><br><br>
            
                <p><b>🧪 Result:</b> 
                    <span class="${r[2].includes("Benign") ? "green" : "red"}">
                        ${r[2]}
                    </span>
                </p>
            
                <p><b>📅 Date:</b> ${r[3]}</p>
            
                <button onclick="downloadReport(${r[0]})">📄 Download PDF</button>
<button onclick="loadReports()">⬅ Back</button>
            
            </div>
            `;
        });
    
    }

    window.onload = function() {

        let token = localStorage.getItem("token");
    
        if(token){
            //  User already logged in
            document.getElementById("loginPage").style.display = "none";
            document.getElementById("signupPage").style.display = "none";
            document.getElementById("dashboard").style.display = "flex";
    
        } else {
            // Not logged in
            document.getElementById("loginPage").style.display = "flex";
            document.getElementById("signupPage").style.display = "none";
            document.getElementById("dashboard").style.display = "none";
        }
    };

    function sendChat(){

    let input = document.getElementById("chatInput");
    let msg = input.value.trim();

    if(msg === "") return;

    let box = document.getElementById("chatMessages");

    box.innerHTML += `<div class="user-msg">${msg}</div>`;
    box.innerHTML += `<div class="bot-msg" id="typing">Typing...</div>`;

    box.scrollTop = box.scrollHeight;

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": localStorage.getItem("token")
        },
        body: JSON.stringify({
            message: msg
        })
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("typing").remove();

        box.innerHTML += `<div class="bot-msg">${data.reply}</div>`;
        box.scrollTop = box.scrollHeight;
    });

    input.value = "";
}

function sendChat(){

     let input = document.getElementById("chatInput");
     let msg = input.value.trim();

    if(msg === "") return;

    let box = document.getElementById("chatMessages");

    box.innerHTML += `<div class="user-msg">${msg}</div>`;
    box.innerHTML += `<div class="bot-msg" id="typing">Typing...</div>`;

    box.scrollTop = box.scrollHeight;

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": localStorage.getItem("token")
        },
        body: JSON.stringify({
            message: msg
        })
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("typing").remove();

        box.innerHTML += `<div class="bot-msg">${data.reply}</div>`;
        box.scrollTop = box.scrollHeight;
    });

    input.value = "";
}
  function toggleChatbot(){
    document.getElementById("chatbotBox").classList.toggle("hidden");
}
function downloadReport(id){
    window.open(`/download_report/${id}`, "_blank");
}
    </script>
</body>
</html>
